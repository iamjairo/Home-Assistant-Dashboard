name: Format Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v47
        with:
          separator: "\n"
          files: |
            **/*.js
            **/*.jsx
            **/*.ts
            **/*.tsx
            **/*.json
            **/*.css
            **/*.md
            **/*.yml
            **/*.yaml
            **/*.mjs
            **/*.cjs
            **/*.html

      - name: Check formatting (changed files only)
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          mapfile -t files <<'EOF'
          ${{ steps.changed.outputs.all_changed_files }}
          EOF

          filtered_files=()
          for file in "${files[@]}"; do
            if [ -n "$file" ]; then
              filtered_files+=("$file")
            fi
          done

          if [ "${#filtered_files[@]}" -eq 0 ]; then
            echo "No format-relevant changed files."
            exit 0
          fi

          npx prettier --check "${filtered_files[@]}"

      - name: No format-relevant changes
        if: steps.changed.outputs.any_changed != 'true'
        run: echo "No format-relevant changed files."
